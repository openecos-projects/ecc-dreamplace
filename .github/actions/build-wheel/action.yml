name: Build DreamPlace Wheel
description: Compile C++ operators, build raw wheel, auditwheel repair, smoke test
# Requires: container quay.io/pypa/manylinux_2_34_x86_64 at the job level

runs:
  using: composite
  steps:
    - name: Install system dependencies
      shell: bash
      run: |
        dnf install -y epel-release
        dnf config-manager --set-enabled crb || true
        dnf install -y \
          cmake ninja-build pkgconfig patchelf \
          boost-devel cairo-devel gflags-devel \
          glog-devel flex flex-devel bison eigen3-devel gtest-devel unzip zip

    - name: Setup Python 3.11
      shell: bash
      run: echo "/opt/python/cp311-cp311/bin" >> "$GITHUB_PATH"

    - name: Setup Bazel
      shell: bash
      run: |
        curl -fsSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 \
          -o /usr/local/bin/bazel
        chmod +x /usr/local/bin/bazel

    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        version: latest
        enable-cache: true

    - name: Install Python dependencies
      shell: bash
      run: uv sync --frozen --all-groups --python 3.11

    - name: Build repaired wheel (auditwheel + smoke test)
      shell: bash
      run: bazel run //:build_dreamplace_wheel
