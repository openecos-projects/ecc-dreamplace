name: Build DreamPlace Wheel
description: Compile C++ operators, build raw wheel, auditwheel repair, smoke test
# Requires: container quay.io/pypa/manylinux_2_28_x86_64 at the job level

runs:
  using: composite
  steps:
    - name: Install system dependencies
      shell: bash
      run: |
        yum install -y epel-release
        yum install -y dnf-plugins-core
        dnf config-manager --set-enabled powertools || true
        yum install -y \
          cmake ninja-build pkgconfig patchelf \
          boost-devel cairo-devel gflags-devel \
          glog-devel flex flex-devel bison eigen3-devel gtest-devel unzip zip

    - name: Setup Python 3.11
      shell: bash
      run: echo "/opt/python/cp311-cp311/bin" >> "$GITHUB_PATH"

    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.14.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true

    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        version: latest
        enable-cache: true

    - name: Install Python dependencies
      shell: bash
      run: uv sync --frozen --all-groups --python 3.11

    - name: Build repaired wheel (auditwheel + smoke test)
      shell: bash
      run: |
        source /opt/rh/gcc-toolset-12/enable
        bazel run //:build_dreamplace_wheel
